---
- name: Block C. Install and Configure containerd
  block:
    - name: "Step C1. Add Docker GPG key (containerd.io is distributed via Docker repo)"
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/ubuntu/gpg"
        dest: "/tmp/docker.gpg"
        mode: "0644"
      retries: 5
      delay: 10

    - name: "Step C2. Dearmor Docker GPG key"
      ansible.builtin.command:
        cmd: "gpg --dearmor -o /etc/apt/keyrings/docker.gpg /tmp/docker.gpg"
      args:
        creates: "/etc/apt/keyrings/docker.gpg"
      register: gpg_dearmor_docker_result
      changed_when: gpg_dearmor_docker_result.rc == 0 and 'overwrite' not in gpg_dearmor_docker_result.stderr

    - name: "Step C3. Add Docker apt repository for containerd.io"
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        state: present
        filename: "docker-for-containerd"

    - name: "Step C4. Force apt cache update"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      changed_when: false

    - name: "Step C5. Install containerd.io"
      ansible.builtin.apt:
        name: "{{ kubeadm_base.packages.apt.containerd }}"
        state: present
      notify: Restart containerd service

    - name: "Step C6. Download crictl archive"
      ansible.builtin.get_url:
        url: "{{ _kubeadm_base_crictl_download_url }}"
        dest: "{{ _kubeadm_base_crictl_temp_path }}"
        mode: "0644"
      retries: 5
      delay: 10

    - name: "Step C7. Unarchive crictl"
      ansible.builtin.unarchive:
        src: "{{ _kubeadm_base_crictl_temp_path }}"
        dest: "{{ _kubeadm_base_crictl_data.dest_path }}"
        remote_src: true
        mode: "0755"
        creates: "{{ _kubeadm_base_crictl_data.dest_path }}/crictl"

    - name: "Step C8. Clean up crictl archive"
      ansible.builtin.file:
        path: "{{ _kubeadm_base_crictl_temp_path }}"
        state: absent

    - name: "Step C9. Ensure containerd config directory exists"
      ansible.builtin.file:
        path: "{{ kubeadm_base.config_paths.containerd_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: "Step C10. Deploy containerd config.toml (enable SystemdCgroup and certs.d)"
      ansible.builtin.template:
        src: C-containerd-config.toml.j2
        dest: "{{ kubeadm_base.config_paths.containerd_config }}"
        owner: root
        group: root
        mode: "0644"
      notify: Restart containerd service

    - name: "Step C11. Ensure containerd certs.d base directory exists"
      ansible.builtin.file:
        path: "{{ kubeadm_base.config_paths.certs_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: "Step C12. Verify containerd config path"
      ansible.builtin.stat:
        path: "{{ kubeadm_base.config_paths.containerd_config }}"
      register: containerd_config_stat
      failed_when: not containerd_config_stat.stat.exists
